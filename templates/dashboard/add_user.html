{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- Left Side Bar  -->
    <!-- import sidebar here  -->
     {% include 'dashboard/sidebar.html' %}

    <!-- Right Side Bar  -->
    <div class="col-md-9">
        {% if perms.auth.view_user %}
        <div class="row d-flex align-items-center" style="padding: 35px;">
            <h2 class="mb-0">Add New User</h2>
        </div>
        <form action="{% url 'add_user' %}" method = "POST" style="padding: 35px;">
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
        {% else %}
            <h4>You do not have permission to visit this site</h4>
        {% endif %}
    </div>
</div>

{% endblock %}
