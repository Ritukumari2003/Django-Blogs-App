{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- Left Side Bar  -->
    <!-- import sidebar here  -->
     {% include 'dashboard/sidebar.html' %}

    <!-- Right Side Bar  -->
    <div class="col-md-9">
        <div class="row d-flex align-items-center" style="padding: 35px;">
            <h2 class="mb-0">Edit User</h2>
        </div>
        <form action="{% url 'edit_user' user.id %}" method = "POST" style="padding: 35px;"> 
             <!-- for file field i.e.image file, we need to add "enctype" -->
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
    </div>
</div>

{% endblock %}
